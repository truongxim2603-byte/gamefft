<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Chữ Cái p - q</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #fef3c7 0%, #d1fae5 100%); 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 500px;
            width: 100%;
        }

        .card { 
            aspect-ratio: 1 / 1;
            perspective: 1000px; 
            cursor: pointer; 
        }
        
        .card-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            text-align: center; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
            border-radius: 1rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3rem; 
            font-weight: 800;
            border: 4px solid white;
        }

        .card-back { background: #fb923c; color: white; }
        .card-front { background: white; transform: rotateY(180deg); }
        
        .p-color { color: #f97316; }
        .q-color { color: #ef4444; }

        #feedback {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="feedback" class="fixed top-5 z-50 text-2xl font-bold p-4 bg-white/90 backdrop-blur rounded-2xl shadow-xl border-4 border-orange-300 text-orange-600 hidden"></div>

    <div class="text-center mb-6">
        <h1 class="text-3xl font-black text-gray-800 mb-1">Khu Vườn Chữ Cái p - q</h1>
        <p id="level-title" class="text-gray-600 font-bold text-xl">Màn 1</p>
        <div class="mt-4 flex gap-4 justify-center">
            <div class="bg-white px-6 py-2 rounded-full shadow-md font-bold text-lg text-gray-700">
                Điểm: <span id="score" class="text-orange-600">0</span>
            </div>
        </div>
    </div>

    <div id="grid" class="game-container">
        <!-- Cards generated by JS -->
    </div>

    <div class="mt-8 flex gap-4">
        <button id="reset-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition-all active:scale-95">
            Chơi lại
        </button>
        <button id="next-level-btn" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition-all active:scale-95">
            Sang màn tiếp
        </button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const resetBtn = document.getElementById('reset-btn');
        const nextLevelBtn = document.getElementById('next-level-btn');
        const levelTitle = document.getElementById('level-title');
        const feedback = document.getElementById('feedback');
        
        let score = 0;
        let currentLevel = 1;
        let flippedCards = [];
        let matchedPairs = 0;
        let isProcessing = false;
        let synth;

        function initAudio() {
            if (!synth) {
                synth = new Tone.Synth().toDestination();
            }
        }

        function showFeedback(msg, isPositive) {
            feedback.innerText = msg;
            feedback.classList.remove('hidden', 'text-orange-600', 'text-red-500');
            feedback.classList.add(isPositive ? 'text-orange-600' : 'text-red-500');
            setTimeout(() => feedback.classList.add('hidden'), 1500);
        }

        function createBoard(level) {
            grid.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            isProcessing = false;
            nextLevelBtn.classList.add('hidden');
            
            const cards = level === 1 
                ? ['p', 'p', 'p', 'p', 'q', 'q', 'q', 'q'] 
                : ['p', 'p', 'p', 'p', 'p', 'p', 'q', 'q', 'q', 'q', 'q', 'q'];
            
            cards.sort(() => Math.random() - 0.5);

            cards.forEach((val) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.val = val;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">?</div>
                        <div class="card-face card-front ${val === 'p' ? 'p-color' : 'q-color'}">${val}</div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        async function flipCard(card) {
            if (isProcessing || card.classList.contains('flipped')) return;

            initAudio();
            if (Tone.context.state !== 'running') await Tone.start();
            if (synth) synth.triggerAttackRelease("C5", "16n");

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                isProcessing = true;
                setTimeout(checkMatch, 600);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.val === c2.dataset.val) {
                score += 10;
                scoreEl.innerText = score;
                matchedPairs++;
                
                const phrases = ["Giỏi quá!", "Chính xác!", "Tuyệt vời!", "Đúng rồi!"];
                showFeedback(phrases[Math.floor(Math.random() * phrases.length)], true);
                
                if (synth) synth.triggerAttackRelease("G5", "8n");
                
                const totalPairs = currentLevel === 1 ? 4 : 6;
                if (matchedPairs === totalPairs) {
                    if (currentLevel === 1) {
                        showFeedback("Hoàn thành màn 1!", true);
                        nextLevelBtn.classList.remove('hidden');
                    } else {
                        showFeedback("Chiến thắng rồi!", true);
                    }
                }
            } else {
                showFeedback("Thử lại nhé!", false);
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                if (synth) synth.triggerAttackRelease("C3", "16n");
            }
            flippedCards = [];
            isProcessing = false;
        }

        resetBtn.addEventListener('click', () => {
            currentLevel = 1;
            score = 0;
            scoreEl.innerText = '0';
            levelTitle.innerText = "Màn 1";
            createBoard(1);
        });

        nextLevelBtn.addEventListener('click', () => {
            currentLevel = 2;
            levelTitle.innerText = "Màn 2";
            createBoard(2);
        });

        createBoard(1);
    </script>
</body>
</html>
